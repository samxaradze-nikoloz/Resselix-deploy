{% extends "blog/base.html" %}
{% block content %}
<div class="container mt-4 checkout-container">
    <h2>Secure Checkout</h2>
    <div class="row">
        <div class="col-md-4 order-md-2 mb-4">
            <h4 class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted">Your cart</span>
                <span class="badge badge-secondary badge-pill">{{ items.count }}</span>
            </h4>
            <ul class="list-group mb-3">
                {% for item in items %}
                <li class="list-group-item d-flex justify-content-between lh-condensed">
                    <div>
                        <h6 class="my-0">{{ item.post.title }}</h6>
                    </div>
                    <span class="text-muted">${{ item.post.price }}</span>
                </li>
                {% endfor %}
                <li class="list-group-item d-flex justify-content-between">
                    <span>Total (USD)</span>
                    <strong>${{ total }}</strong>
                </li>
            </ul>
        </div>

        <div class="col-md-8 order-md-1">
            <form method="POST">
                {% csrf_token %}
                <h4 class="mb-3">Payment</h4>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cc-name">Name on card</label>
                        <input type="text" class="form-control" name="cc_name" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cc-number">Credit card number</label>
                        <input type="text" class="form-control" name="cc_number" placeholder="0000 0000 0000 0000" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label for="cc-expiration">Expiration</label>
                        <input type="text" class="form-control" name="cc_expiry" placeholder="MM/YY" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="cc-cvv">CVV</label>
                        <input type="text" class="form-control" name="cc_cvv" placeholder="123" required>
                    </div>
                </div>

                <hr class="mb-4">
                <button class="btn btn-primary btn-lg btn-block" type="submit">Place Order & Pay Now</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
