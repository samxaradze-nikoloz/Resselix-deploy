{% extends "blog/base.html" %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>

<style>
.site-container { padding:20px; }
.card-modern { background:#fff; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.08); max-width:850px; margin:auto; padding:25px; }
label { font-weight:600; display:block; margin-bottom:6px; }
input, select, textarea { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; outline:none; }
input:focus, select:focus, textarea:focus { border-color:#111; }
.row-flex { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
.btn { padding:10px 12px; border-radius:10px; border:none; cursor:pointer; font-weight:600; }
.btn-dark { background:#111; color:#fff; }
.btn-light { background:#eee; }
.map-box { height:320px; border-radius:12px; overflow:hidden; margin-top:10px; display:none; }
.preview-main { width:140px; height:140px; object-fit:cover; border-radius:12px; border:2px solid #ddd; margin-top:10px; }
.preview-img { width:90px; height:90px; object-fit:cover; border-radius:10px; border:2px solid #eee; }
.preview-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
</style>

<div class="site-container">
  <div class="card-modern">

    <h2 style="font-weight:800; margin-bottom:20px;">Create New Listing</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div style="margin-bottom:12px;">
        <label>Title</label>
        {{ form.title }}
      </div>

      <div style="margin-bottom:12px;">
        <label>Price</label>
        {{ form.price }}
      </div>

      <div style="margin-bottom:12px;">
        <label>Description</label>
        {{ form.content }}
      </div>

      <div style="margin-bottom:12px;">
        <label>Category</label>
        <select name="category" id="id_category" required>
          <option value="">Select category</option>
          {% for value, label in form.fields.category.choices %}
            {% if value %}<option value="{{ value }}">{{ label }}</option>{% endif %}
          {% endfor %}
        </select>
      </div>

      <div style="margin-bottom:12px;">
        <label>Subcategory</label>
        <select name="subcategory" id="id_subcategory" required>
          <option value="">Select subcategory</option>
        </select>
      </div>

      <div style="margin-bottom:12px;">
        <label>Main Image</label>
        <input type="file" id="mainImage" name="main_image" accept="image/*" required>
        <div id="mainPreview"></div>
      </div>

      <div style="margin-bottom:12px;">
        <label>Extra Images</label>
        <input type="file" id="extraImages" name="images" multiple accept="image/*">
        <div class="preview-grid" id="extraPreview"></div>
      </div>

      <div style="margin-bottom:12px;">
        <label>Address</label>
        {{ form.address }}
      </div>

      <div class="row-flex">
        <button type="button" class="btn btn-dark" id="useMyLocation">📍 Use My Location</button>
        <button type="button" class="btn btn-light" id="customLocationBtn">🗺️ Open Map</button>
      </div>

      <div id="map" class="map-box"></div>

      {{ form.latitude }}
      {{ form.longitude }}

      <button type="submit" class="btn btn-dark" style="width:100%; margin-top:15px;">
        🚀 Post Listing
      </button>

    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
let mapVisible = false;
let map;
let marker;

function initMap() {
  if (map) return;

  let lat = 41.7151;
  let lng = 44.8271;

  map = L.map('map').setView([lat, lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  marker = L.marker([lat, lng], { draggable: true }).addTo(map);

  const latInput = document.getElementById("id_latitude");
  const lngInput = document.getElementById("id_longitude");
  const addrInput = document.querySelector("input[name='address']");

  function setLocation(lat, lng) {
    latInput.value = lat;
    lngInput.value = lng;

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
      .then(r => r.json())
      .then(data => {
        if (data.display_name) addrInput.value = data.display_name;
      });
  }

  marker.on("dragend", e => {
    const p = e.target.getLatLng();
    setLocation(p.lat, p.lng);
  });

  map.on("click", e => {
    marker.setLatLng(e.latlng);
    setLocation(e.latlng.lat, e.latlng.lng);
  });

  L.Control.geocoder({
    defaultMarkGeocode: false,
    geocoder: L.Control.Geocoder.nominatim({
      geocodingQueryParams: { limit: 6, addressdetails: 1 }
    })
  })
  .on("markgeocode", function(e) {
    const c = e.geocode.center;
    marker.setLatLng(c);
    map.setView(c, 15);
    setLocation(c.lat, c.lng);
  })
  .addTo(map);
}

document.getElementById("customLocationBtn").onclick = function () {
  document.getElementById("map").style.display = "block";
  if (!mapVisible) {
    setTimeout(() => {
      initMap();
      map.invalidateSize();
    }, 200);
    mapVisible = true;
  }
};

document.getElementById("useMyLocation").onclick = function () {
  document.getElementById("map").style.display = "block";
  if (!mapVisible) {
    setTimeout(() => {
      initMap();
      map.invalidateSize();
    }, 200);
    mapVisible = true;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    marker.setLatLng([lat, lng]);
    map.setView([lat, lng], 15);

    document.getElementById("id_latitude").value = lat;
    document.getElementById("id_longitude").value = lng;

    const addrInput = document.querySelector("input[name='address']");

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
      .then(r => r.json())
      .then(data => {
        if (data.display_name) addrInput.value = data.display_name;
      });
  });
};

document.getElementById("mainImage").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("mainPreview").innerHTML =
      `<img src="${e.target.result}" class="preview-main">`;
  };
  reader.readAsDataURL(file);
});

document.getElementById("extraImages").addEventListener("change", function(){
  const box = document.getElementById("extraPreview");
  box.innerHTML = "";

  Array.from(this.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = document.createElement("img");
      img.src = e.target.result;
      img.className = "preview-img";
      box.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

const subcategories = {
  electronics: [["phones","Phones"],["laptops","Laptops"],["tech_accessories","Tech Accessories"]],
  fashion: [["men","Men Fashion"],["women","Women Fashion"],["shoes","Shoes"]],
  sports: [["winter_sports","Winter Sports"],["football","Football"],["basketball","Basketball"],["gym","Gym"]],
  home: [["furniture","Furniture"],["decor","Decor"]],
  accessories: [["phone_cases","Phone Cases"],["watches","Watches"],["bags","Bags"],["jewelry","Jewelry"]],
  accounts: [["steam","Steam"],["epic","Epic"],["riot","Riot"],["psn","PSN"],["xbox","Xbox"]],
  misc: []
};

document.getElementById("id_category").addEventListener("change", function(){
  const sub = document.getElementById("id_subcategory");
  sub.innerHTML = "<option value=''>Select subcategory</option>";
  (subcategories[this.value] || []).forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p[0];
    opt.textContent = p[1];
    sub.appendChild(opt);
  });
});
</script>

{% endblock %}
