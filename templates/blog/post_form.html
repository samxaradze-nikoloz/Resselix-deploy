{% extends "blog/base.html" %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<div class="site-container">
  <div class="card-modern" style="padding:20px; max-width:750px; margin:auto;">
    <h2 style="font-weight:800; margin-bottom:15px;">Create New Listing</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
      {% endif %}

      <label>Title</label>
      {{ form.title }}
      <br>

      <label>Price</label>
      {{ form.price }}
      <br>

      <label>Description</label>
      {{ form.content }}
      <br>

      <label>Category</label>
      <select name="category" id="id_category" class="form-control" required>
        <option value="">Select category</option>
        {% for value, label in form.fields.category.choices %}
            {% if value %} <option value="{{ value }}">{{ label }}</option> {% endif %}
        {% endfor %}
      </select>
      <br>

      <label>Subcategory</label>
      <select name="subcategory" id="id_subcategory" class="form-control" required>
        <option value="">Select subcategory</option>
      </select>
      <br>

      <label>Main Image</label>
      <input type="file" name="main_image" class="form-control" required>
      <br>

      <label>Extra Images (Hold Ctrl to select multiple)</label>
      <input type="file" name="images" class="form-control" multiple>
      <br>

      <label>Address</label>
      {{ form.address }}
      <br>

      <label>Pick Location</label>
      <div id="map" style="height:300px; border-radius:10px; margin-bottom: 10px;"></div>

      {{ form.latitude }}
      {{ form.longitude }}

      <button type="submit" class="btn-modern-save">
        🚀 Post Listing
      </button>
    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- LEAFLET MAP LOGIC ---
let lat = 41.7151;
let lng = 44.8271;

const map = L.map('map').setView([lat, lng], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker([lat, lng], {draggable:true}).addTo(map);

// Django auto-assigns IDs like 'id_latitude' to form fields
const latInput = document.getElementById("id_latitude");
const lngInput = document.getElementById("id_longitude");

function updateCoords(l, g){
  latInput.value = l.toFixed(6);
  lngInput.value = g.toFixed(6);
}

// Initial values
updateCoords(lat, lng);

marker.on('dragend', function(){
  const p = marker.getLatLng();
  updateCoords(p.lat, p.lng);
});

map.on('click', function(e){
  marker.setLatLng(e.latlng);
  updateCoords(e.latlng.lat, e.latlng.lng);
});

setTimeout(() => map.invalidateSize(), 300);

// --- DYNAMIC SUBCATEGORIES ---
// IMPORTANT: These strings must match SUBCATEGORY_CHOICES in models.py exactly!
const subcategories = {
  electronics: [["phones", "Phones"], ["laptops", "Laptops"], ["tech_accessories", "Tech Accessories"]],
  fashion: [["men", "Men Fashion"], ["women", "Women Fashion"], ["shoes", "Shoes"]],
  sports: [["winter_sports", "Winter Sports"], ["football", "Football"], ["basketball", "Basketball"], ["gym", "Gym / Fitness"]],
  home: [["furniture", "Furniture"], ["decor", "Decorations"]],
  accessories: [["phone_cases", "Phone Cases"], ["watches", "Watches"], ["bags", "Bags"], ["jewelry", "Jewelry"]],
  accounts: [["steam", "Steam Account"], ["epic", "Epic Games Account"], ["riot", "Riot Games Account"], ["psn", "PlayStation Account"], ["xbox", "Xbox Account"]],
  misc: [] 
};

document.getElementById("id_category").addEventListener("change", function () {
  const subSelect = document.getElementById("id_subcategory");
  subSelect.innerHTML = "<option value=''>Select subcategory</option>";

  const choices = subcategories[this.value];
  if (choices) {
    choices.forEach(pair => {
      let opt = document.createElement("option");
      opt.value = pair[0];
      opt.textContent = pair[1];
      subSelect.appendChild(opt);
    });
  }
});
</script>
{% endblock %}
