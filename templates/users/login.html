{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% load socialaccount %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to your Resselix account</p>

        <form method="POST">
            {% csrf_token %}

            <fieldset class="form-group">
                {{ form|crispy }}
            </fieldset>

            <button class="btn btn-main w-100" type="submit">
                Login
            </button>

        </form>

        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Google Login -->
        <a href="{% provider_login_url 'google' %}" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg">
            Continue with Google
        </a>

        <div class="auth-footer">
            <small>
                Forgot password?
                <a href="{% url 'password_reset' %}">Reset</a>
            </small>

            <br>

            <small>
                Need an account?
                <a href="{% url 'register' %}">Sign up</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
