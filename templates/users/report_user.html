{% extends "blog/base.html" %}
{% load static %}
{% block content %}

<div class="site-container mt-5">

    <div class="card-modern p-4" style="max-width:520px;margin:auto;">

       
        <h3 class="fw-bold text-center">Report User</h3>

        <p class="text-muted text-center mt-2">
            You are reporting: <strong>{{ reported_user.username }}</strong>
        </p>

        <hr>

       
        <form method="POST">
            {% csrf_token %}

            
            <label class="form-label mt-2">Reason</label>
            <select name="reason" class="form-control" required>
                <option value="">Select reason</option>
                <option value="spam">Spam</option>
                <option value="scam">Scam / Fraud</option>
                <option value="abuse">Abusive behavior</option>
                <option value="fake">Fake account</option>
                <option value="other">Other</option>
            </select>

           
            <label class="form-label mt-3">Details (optional)</label>
            <textarea name="message"
                      class="form-control"
                      rows="4"
                      placeholder="Explain what happened..."></textarea>

            
            <button type="submit"
                    class="btn btn-danger w-100 mt-4 fw-bold">
                🚨 Submit Report
            </button>

        </form>

       
        <p class="text-muted text-center mt-3" style="font-size:13px;">
            Reports are reviewed by moderators. Abuse of this system may result in action.
        </p>

    </div>

</div>

{% endblock %}
